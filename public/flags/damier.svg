<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <pattern id="checker" x="0" y="0" width="60" height="40" patternUnits="userSpaceOnUse">
      <rect x="0"  y="0"  width="30" height="20" fill="#111111"/>
      <rect x="30" y="0"  width="30" height="20" fill="#FFFFFF"/>
      <rect x="0"  y="20" width="30" height="20" fill="#FFFFFF"/>
      <rect x="30" y="20" width="30" height="20" fill="#111111"/>
    </pattern>
  </defs>
  <rect width="300" height="200" fill="url(#checker)"/>
</svg>
